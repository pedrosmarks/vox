<header class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" routerLink="/projetos">
      <div class="brand-icon">
        <img src="logo2.jpeg" alt="VOX" class="brand-logo" />
      </div>
      <div class="brand-text">
        <span class="brand-vox">VOX</span>
        <span class="brand-cidadao">CIDADÃO</span>
      </div>
    </a>

    <nav class="navbar-nav">
      <a
        routerLink="/projetos"
        routerLinkActive="active"
        class="nav-link"
      >Projetos em votação</a>

      <a
        *ngIf="!isModerator"
        routerLink="/sugestoes"
        routerLinkActive="active"
        class="nav-link"
      >Sugestões</a>

      <a
        routerLink="/comunidade"
        routerLinkActive="active"
        class="nav-link"
      >Comunidade</a>

      <a
        *ngIf="isModerator"
        routerLink="/moderacao"
        routerLinkActive="active"
        class="nav-link"
      >Moderação</a>

      <div class="user-menu">
        <button class="user-avatar" (click)="toggleMenu()" [class.open]="menuOpen">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
          <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="12" height="12">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </button>

        <div class="user-dropdown" *ngIf="menuOpen">
          <a routerLink="/perfil" class="dropdown-item" (click)="menuOpen = false">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            Meu Perfil
          </a>
          <a routerLink="/configuracoes" class="dropdown-item" (click)="menuOpen = false">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Configurações
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" (click)="logout()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair
          </button>
        </div>
      </div>
    </nav>
  </div>
</header>
