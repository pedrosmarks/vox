<div class="login-page">
  <div class="login-container">

    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-wrapper">
        <img src="logo2.jpeg" alt="Vox Cidadão" class="logo-img" />
      </div>
      <h1 class="brand-title">VOX CIDADÃO</h1>
      <p class="brand-subtitle">A política de volta para o cidadão</p>
    </div>

    <!-- Card de Login -->
    <div class="login-card">
      <h2 class="card-title">Entrar na sua conta</h2>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

        <!-- Campo Email -->
        <div class="form-group">
          <label for="email" class="form-label">E-mail</label>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="seu@email.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>

        <!-- Campo Senha -->
        <div class="form-group">
          <label for="password" class="form-label">Senha</label>
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            required
          />
        </div>

        <!-- Mensagem de erro -->
        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <!-- Botão de entrar -->
        <button type="submit" class="btn-login" [disabled]="isLoading">
          <span *ngIf="!isLoading">Entrar</span>
          <span *ngIf="isLoading" class="loading-spinner">Entrando...</span>
        </button>
      </form>

      <div class="card-footer">
        <p class="footer-text">
          Não tem uma conta?
          <a href="#" class="footer-link">Cadastre-se</a>
        </p>
      </div>
    </div>

    <!-- Rodapé -->
    <div class="page-footer">
      <p>© 2026 Vox Cidadão — Todos os direitos reservados</p>
    </div>

  </div>
</div>
