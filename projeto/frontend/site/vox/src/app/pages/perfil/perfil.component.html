<app-navbar></app-navbar>

<main class="perfil-page">

  <!-- Loading -->
  <div *ngIf="isLoading" class="state-message">
    <div class="spinner"></div>
    <p>Carregando perfil...</p>
  </div>

  <!-- Erro de carga -->
  <div *ngIf="!isLoading && loadError" class="state-message error">
    <p>{{ loadError }}</p>
    <button class="btn-retry" (click)="loadUser()">Tentar novamente</button>
  </div>

  <!-- Conteúdo -->
  <div *ngIf="!isLoading && !loadError && user" class="perfil-content">

    <!-- Card de identidade -->
    <div class="identity-card">
      <div class="avatar-circle">
        {{ (user.name || user.email).charAt(0).toUpperCase() }}
      </div>
      <div class="identity-info">
        <h1 class="identity-name">{{ user.name || 'Sem nome' }}</h1>
        <p class="identity-email">{{ user.email }}</p>
        <span class="role-badge" [ngClass]="getRoleClass(user.role)">
          {{ getRoleLabel(user.role) }}
        </span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn" [class.active]="activeTab === 'dados'" (click)="activeTab = 'dados'; profileSuccess = ''; profileError = ''">
        Meus Dados
      </button>
      <button class="tab-btn" [class.active]="activeTab === 'senha'" (click)="activeTab = 'senha'; passwordSuccess = ''; passwordError = ''">
        Alterar Senha
      </button>
    </div>

    <!-- ── ABA: Dados ── -->
    <div *ngIf="activeTab === 'dados'" class="tab-panel">

      <div *ngIf="profileSuccess" class="alert alert-success">{{ profileSuccess }}</div>
      <div *ngIf="profileError"   class="alert alert-error">{{ profileError }}</div>

      <div class="form-grid">

        <div class="form-group">
          <label class="form-label">Nome</label>
          <input type="text" class="form-input" [(ngModel)]="editForm.name" [disabled]="isSavingProfile" />
        </div>

        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-input disabled" [value]="user.email" disabled title="O e-mail não pode ser alterado aqui." />
        </div>

        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input type="tel" class="form-input" [(ngModel)]="editForm.phone" placeholder="(00) 00000-0000" [disabled]="isSavingProfile" />
        </div>

        <div class="form-group" *ngIf="user.cpf">
          <label class="form-label">CPF</label>
          <input type="text" class="form-input disabled" [value]="user.cpf" disabled />
        </div>

        <div class="form-group" *ngIf="user.birthDate">
          <label class="form-label">Data de Nascimento</label>
          <input type="text" class="form-input disabled" [value]="user.birthDate | date:'dd/MM/yyyy'" disabled />
        </div>

      </div>

      <div class="form-actions">
        <button class="btn-save" (click)="saveProfile()" [disabled]="isSavingProfile">
          {{ isSavingProfile ? 'Salvando...' : 'Salvar alterações' }}
        </button>
      </div>
    </div>

    <!-- ── ABA: Senha ── -->
    <div *ngIf="activeTab === 'senha'" class="tab-panel">

      <div *ngIf="passwordSuccess" class="alert alert-success">{{ passwordSuccess }}</div>
      <div *ngIf="passwordError"   class="alert alert-error">{{ passwordError }}</div>

      <div class="form-grid single-col">

        <div class="form-group">
          <label class="form-label">Senha atual</label>
          <div class="input-password">
            <input
              [type]="showCurrent ? 'text' : 'password'"
              class="form-input"
              [(ngModel)]="passwordForm.current"
              [disabled]="isSavingPassword"
              placeholder="Digite sua senha atual"
            />
            <button type="button" class="toggle-pw" (click)="showCurrent = !showCurrent">
              {{ showCurrent ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Nova senha</label>
          <div class="input-password">
            <input
              [type]="showNew ? 'text' : 'password'"
              class="form-input"
              [(ngModel)]="passwordForm.newPass"
              [disabled]="isSavingPassword"
              placeholder="Mínimo 6 caracteres"
            />
            <button type="button" class="toggle-pw" (click)="showNew = !showNew">
              {{ showNew ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirmar nova senha</label>
          <div class="input-password">
            <input
              [type]="showConfirm ? 'text' : 'password'"
              class="form-input"
              [(ngModel)]="passwordForm.confirm"
              [disabled]="isSavingPassword"
              placeholder="Repita a nova senha"
            />
            <button type="button" class="toggle-pw" (click)="showConfirm = !showConfirm">
              {{ showConfirm ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

      </div>

      <div class="form-actions">
        <button class="btn-save" (click)="savePassword()" [disabled]="isSavingPassword">
          {{ isSavingPassword ? 'Alterando...' : 'Alterar senha' }}
        </button>
      </div>
    </div>

  </div>
</main>
